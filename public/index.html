<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORACLE | Neural Vision</title>
    <style>
        body { background: #050505; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; overflow: hidden; }
        .header { background: rgba(59, 130, 246, 0.1); padding: 20px; border-bottom: 2px solid #3B82F6; text-align: center; letter-spacing: 5px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 10px #3B82F6; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,1); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .bot { background: #1F2937; align-self: flex-start; color: white; border-bottom-left-radius: 2px; }
        .user { background: #3B82F6; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .img-preview { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #3B82F6; }
        .input-area { background: #111; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid #3B82F6; color: white; padding: 15px; border-radius: 30px; outline: none; }
        .file-btn { background: #333; color: #3B82F6; border: 1px solid #3B82F6; padding: 10px 15px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; }
        button#s { background: #3B82F6; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">THE ORACLE NEURAL VISION</div>
    <div id="chat">
        <div class="msg bot">Pranam Boss! Neural Vision Active. Aaj aap koi bhi trading chart ka screenshot mere saath share kijiye, main use Smart Money Concepts (SMC) ke liye analyze karunga.</div>
    </div>
    <form class="input-area" onsubmit="S(event)">
        <label class="file-btn">
            📷 <input type="file" id="f" hidden accept="image/*" onchange="preview()">
        </label>
        <input type="text" id="i" placeholder="Ask or upload chart..." autocomplete="off">
        <button type="submit" id="s">SEND</button>
    </form>

    <script>
        const c = document.getElementById('chat');
        const f = document.getElementById('f');
        const i = document.getElementById('i');
        const btn = document.getElementById('s');
        let selectedImgBase64 = null;

        function preview() {
            if(f.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImgBase64 = e.target.result;
                    addMsg('📷 Chart Selected. Click SEND to analyze...', 'user', selectedImgBase64);
                };
                reader.readAsDataURL(f.files[0]);
            }
        }

        async function S(e) {
            e.preventDefault();
            const val = i.value;
            if(!val && !selectedImgBase64) return;

            if(val && !selectedImgBase64) addMsg(val, 'user');
            
            const currentInputs = { q: val, img: selectedImgBase64 };
            
            i.value = '';
            f.value = '';
            selectedImgBase64 = null;
            btn.classList.add('loading');
            btn.innerText = 'Analyzing...';

            const loadMsg = addMsg("Ji Boss, main chart ka DNA scan kar raha hoon... Bas ek minute.", 'bot');
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentInputs)
                });
                const data = await res.json();
                loadMsg.innerText = data.answer;
            } catch (err) {
                loadMsg.innerText = "Maafi Boss, link mein thoda panga ho gaya. Phir se try kijiye.";
            } finally {
                btn.classList.remove('loading');
                btn.innerText = 'SEND';
                c.scrollTop = c.scrollHeight;
            }
        }

        function addMsg(text, type, img = null) {
            const d = document.createElement('div');
            d.className = 'msg ' + type;
            d.innerText = text;
            if(img) {
                const m = document.createElement('img');
                m.src = img;
                m.className = 'img-preview';
                d.appendChild(m);
            }
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
