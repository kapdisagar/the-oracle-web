<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORACLE | Neural Chat</title>
    <style>
        body { background: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
        .header { background: rgba(59, 130, 246, 0.1); padding: 20px; border-bottom: 1px solid #3B82F6; text-align: center; letter-spacing: 5px; font-weight: bold; text-transform: uppercase; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .msg { padding: 15px 20px; border-radius: 25px; max-width: 80%; line-height: 1.5; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .bot { background: #1F2937; align-self: flex-start; color: white; border-bottom-left-radius: 2px; }
        .user { background: #3B82F6; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .input-area { background: #111; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #000; border: 1px solid #3B82F6; color: white; padding: 15px; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: #60A5FA; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        button { background: #3B82F6; color: white; border: none; padding: 0 30px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">THE ORACLE NEURAL LINK</div>
    <div id="chat-window">
        <div class="msg bot">Pranam Boss! Main aapka Gold Master Agent hoon. Aaj market ke traps pe nazar rakhein.</div>
    </div>
    <form class="input-area" onsubmit="sendMessage(event)">
        <input type="text" id="userInput" placeholder="Ask The Oracle..." autocomplete="off">
        <button type="submit">SEND</button>
    </form>

    <script>
        const chatWindow = document.getElementById('chat-window');
        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const text = input.value;
            if(!text) return;

            addMsg(text, 'user');
            input.value = '';

            fetch('/api/chat?q=' + encodeURIComponent(text))
                .then(res => res.json())
                .then(data => {
                    addMsg(data.answer, 'bot');
                })
                .catch(err => {
                    addMsg("Error connecting to Neural Link. Try again.", 'bot');
                });
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
