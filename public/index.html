<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMIND AI | Neural Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0A0A; --sidebar: #111111; --text: #E5E7EB; --blue: #3B82F6; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; color: var(--blue); text-transform: uppercase; }
        .ceo-status { font-size: 0.8rem; color: #666; font-weight: 400; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }
        .msg { max-width: 85%; line-height: 1.7; font-size: 1rem; color: #D1D5DB; }
        .bot-wrap { align-self: flex-start; display: flex; gap: 15px; }
        .user-wrap { align-self: flex-end; display: flex; flex-direction: column; align-items: flex-end; }
        .msg-text { padding: 10px 0; }
        .msg-img { max-width: 400px; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-container { padding: 40px 10%; position: relative; }
        .input-box { background: #1A1A1A; border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 15px 25px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 50px rgba(0,0,0,0.4); transition: 0.3s; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .action-btn { background: transparent; border: none; font-size: 1.4rem; cursor: pointer; opacity: 0.7; transition: 0.3s; color: var(--text); }
        .send-btn { background: var(--blue); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; transform: rotate(45deg); cursor: pointer; flex-shrink: 0; }
        #preview-area { display: none; padding: 10px; margin-bottom: 10px; background: rgba(59, 130, 246, 0.05); border-radius: 20px; text-align: center; }
        .loading { animation: pulse 1.5s infinite; color: #444; font-size: 0.9rem; margin-bottom: 10px; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">AlphaMind AI</div>
        <div class="ceo-status">PRATAP CEO | Neural Terminal Active</div>
    </div>

    <div id="chat"></div>

    <div class="input-container">
        <div id="preview-area">📷 Chart Selected. AlphaMind is ready.</div>
        <form class="input-box" onsubmit="handleSend(event)">
            <label class="action-btn">
                📎 <input type="file" id="f" hidden accept="image/*" onchange="showPreview()">
            </label>
            <input type="text" id="i" placeholder="Message AlphaMind or upload a trading chart..." autocomplete="off">
            <button type="submit" class="action-btn send-btn">🚀</button>
        </form>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const fileInput = document.getElementById('f');
        const userInput = document.getElementById('i');
        const previewArea = document.getElementById('preview-area');
        const BOSS_EMAIL = "ketshanstudio@gmail.com";
        let selectedImgB64 = null;

        function showPreview() {
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImgB64 = e.target.result;
                    previewArea.style.display = 'block';
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        async function handleSend(e) {
            e.preventDefault();
            const text = userInput.value;
            if(!text && !selectedImgB64) return;

            addMsg(text, 'user', selectedImgB64);
            
            const payload = { q: text, img: selectedImgB64, user_email: BOSS_EMAIL };
            userInput.value = '';
            fileInput.value = '';
            selectedImgB64 = null;
            previewArea.style.display = 'none';

            const loadDiv = document.createElement('div');
            loadDiv.className = 'msg bot-wrap loading';
            loadDiv.innerText = 'AlphaMind AI - Institutional Data Syncing...';
            chat.appendChild(loadDiv);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                chat.removeChild(loadDiv);
                addMsg(data.answer, 'bot');
            } catch (err) {
                loadDiv.innerText = 'Neural link error. Try again.';
            }
        }

        function addMsg(text, type, img = null) {
            const wrap = document.createElement('div');
            wrap.className = type + '-wrap';
            const msg = document.createElement('div');
            msg.className = 'msg';
            if(text) {
                const txt = document.createElement('div');
                txt.className = 'msg-text';
                txt.innerText = text;
                msg.appendChild(txt);
            }
            if(img) {
                const image = document.createElement('img');
                image.src = img;
                image.className = 'msg-img';
                msg.appendChild(image);
            }
            wrap.appendChild(msg);
            chat.appendChild(wrap);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
